; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = 
	lolin32_lite
src_dir = .
include_dir = .

[env:lolin32_lite]
platform = espressif32 @ ^6.10.0
board = lolin32_lite
framework = arduino
lib_deps = 
	chris--a/Keypad @ ^3.1.1
	igorantolic/Ai Esp32 Rotary Encoder @ ^1.6.0
	olikraus/U8g2 @ ^2.35.30
	flash62au/WiThrottleProtocol @ ^1.1.27
	bblanchon/ArduinoJson @ ^7.0
lib_extra_dirs = 
monitor_speed = 115200
monitor_echo = yes
build_flags = 
	-Wall

[env:esp32s3_ili9341]
platform = espressif32 @ ^6.10.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.psram = enabled
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps = 
	chris--a/Keypad @ ^3.1.1
	igorantolic/Ai Esp32 Rotary Encoder @ ^1.6.0
	olikraus/U8g2 @ ^2.35.30
	flash62au/WiThrottleProtocol @ ^1.1.27
	bodmer/TFT_eSPI @ ^2.5.43
	https://github.com/Bodmer/U8g2_for_TFT_eSPI.git
	bblanchon/ArduinoJson @ ^7.0
monitor_speed = 115200
monitor_echo = yes
build_flags = 
	-Wall
	-DUSE_TFT_ESPI
	-DDISPLAY_PROFILE_320x240
	-DBOARD_HAS_PSRAM
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MOSI=11
	-DTFT_SCLK=12
	-DTFT_CS=10
	-DTFT_DC=13
	-DTFT_RST=14
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=20000000
	-DUSE_HSPI_PORT=1
	-DTFT_MISO=-1
	-DUSE_BATTERY_TEST=false
	-DBATTERY_TEST_PIN=1
	-DROTARY_ENCODER_A_PIN=5
	-DROTARY_ENCODER_B_PIN=6
	-DROTARY_ENCODER_BUTTON_PIN=7
	-DUSE_NEW_ADDITIONAL_BUTTONS_FORMAT=1

[env:feather_s3_ili9341]
platform = espressif32 @ ^6.10.0
board = adafruit_feather_esp32s3
framework = arduino
board_build.partitions = partitions-4MB-tinyuf2-littlefs.csv
lib_deps = 
	chris--a/Keypad @ ^3.1.1
	igorantolic/Ai Esp32 Rotary Encoder @ ^1.6.0
	olikraus/U8g2 @ ^2.35.30
	flash62au/WiThrottleProtocol @ ^1.1.27
	bodmer/TFT_eSPI @ ^2.5.43
	https://github.com/Bodmer/U8g2_for_TFT_eSPI.git
	sparkfun/SparkFun Qwiic Keypad Arduino Library @ ^1.2.0
	adafruit/Adafruit MAX1704X @ ^1.0.0
	bblanchon/ArduinoJson @ ^7.0
monitor_speed = 115200
monitor_echo = yes
build_flags = 
	-Wall
	-DUSE_TFT_ESPI
	-DDISPLAY_PROFILE_320x240
	-DBOARD_HAS_PSRAM
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MOSI=35
	-DTFT_SCLK=36
	-DTFT_CS=10
	-DTFT_DC=9
	-DTFT_RST=6
	-DTFT_BL=5
	-DTFT_BACKLIGHT_ON=HIGH
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=20000000
	-DUSE_HSPI_PORT=1
	-DTFT_MISO=-1
	-DUSE_BATTERY_TEST=false
	-DBATTERY_TEST_PIN=1
	; Use MAX17048 I2C fuel gauge (built into Feather ESP32-S3, addr 0x36)
	-DUSE_MAX17048=1
	-DROTARY_ENCODER_A_PIN=13
	-DROTARY_ENCODER_B_PIN=11
	-DROTARY_ENCODER_BUTTON_PIN=12
	-DUSE_NEW_ADDITIONAL_BUTTONS_FORMAT=1
	; Use Qwiic Keypad over I2C instead of GPIO matrix keypad
	-DUSE_QWIIC_KEYPAD=1
	; Use Modulino Knob (I2C rotary encoder) instead of GPIO encoder
	-DUSE_MODULINO_KNOB=1
