; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = 
	lolin32_lite
src_dir = .
include_dir = .

[env:lolin32_lite]
platform = espressif32 @ ^6.10.0
board = lolin32_lite
framework = arduino
lib_deps =
	chris--a/Keypad @ ^3.1.1
	igorantolic/Ai Esp32 Rotary Encoder @ ^1.6.0
	olikraus/U8g2 @ ^2.35.30
	flash62au/WiThrottleProtocol @ ^1.1.27
lib_extra_dirs = 
	; C:\Users\akers\OneDrive\Documents\GitHub\WiThrottleProtocol
monitor_speed = 115200
monitor_echo = yes
build_flags =
	-Wall

; ── ESP32-S3 + ILI9341 320×240 TFT (SPI) ──
; Uses TFT_eSPI library + U8g2_for_TFT_eSPI for font rendering.
; Adjust TFT_MOSI/SCLK/CS/DC/RST pins below to match your wiring.
; Encoder, keypad, and button pins also need updating in config_buttons.h
; for the ESP32-S3 GPIO numbering.
[env:esp32s3_ili9341]
platform = espressif32 @ ^6.10.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi   ; enable OPI PSRAM
board_build.psram = enabled
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps =
	chris--a/Keypad @ ^3.1.1
	igorantolic/Ai Esp32 Rotary Encoder @ ^1.6.0
	olikraus/U8g2 @ ^2.35.30
	flash62au/WiThrottleProtocol @ ^1.1.27
	bodmer/TFT_eSPI @ ^2.5.43
	https://github.com/Bodmer/U8g2_for_TFT_eSPI.git
monitor_speed = 115200
monitor_echo = yes
build_flags =
	-Wall
	-DUSE_TFT_ESPI
	-DDISPLAY_PROFILE_320x240
	-DBOARD_HAS_PSRAM
	; ── TFT_eSPI driver config (avoids editing library User_Setup.h) ──
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	; ── SPI pin mapping for ESP32-S3  ──
	; Adjust these to match your physical wiring
	-DTFT_MOSI=11
	-DTFT_SCLK=12
	-DTFT_CS=10
	-DTFT_DC=13
	-DTFT_RST=14
	; Uncomment and set if your board has a backlight control pin:
	; -DTFT_BL=21
	; -DTFT_BACKLIGHT_ON=HIGH
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=20000000
	-DUSE_HSPI_PORT=1
	-DTFT_MISO=-1
	; ── ESP32-S3 overrides for peripherals not yet wired ──
	-DUSE_BATTERY_TEST=false
	-DBATTERY_TEST_PIN=1
	; Encoder: default pins 12/14/13 conflict with TFT SPI — remap to safe GPIOs
	-DROTARY_ENCODER_A_PIN=5
	-DROTARY_ENCODER_B_PIN=6
	-DROTARY_ENCODER_BUTTON_PIN=7
	; Additional buttons: default pins include flash/PSRAM GPIOs on S3-WROOM — disable
	-DUSE_NEW_ADDITIONAL_BUTTONS_FORMAT=1
